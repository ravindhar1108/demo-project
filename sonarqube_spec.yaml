version: "1.0"
dsl_version: 3
name: "sonar"
backend: "http"
base_url: "https://sonarcloud.io/api"
inputs:
  SONARQUBE_API_KEY: 
    kind: secret

tables:
  - name: "project_measures"
    description: "Live source code quality metrics, security vulnerabilities, and bug counts"
    filters:
      - name: "component"
        required: true
      - name: "metricKeys"
        required: true
    request:
      path: "/measures/component"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
        - name: Content-Type
          from: template
          template: "application/json"
      query:
        - name: "component"
          from: filter
          key: "component"
        - name: "metricKeys"
          from: filter
          key: "metricKeys"
    columns:
      - name: "component"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "component"
      - name: "metricKeys"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "metricKeys"
      - name: "bugs"
        type: "Int64"
      - name: "vulnerabilities"
        type: "Int64"
      - name: "code_smells"
        type: "Int64"
      - name: "sqale_index"
        type: "Int64"
      - name: "duplicated_lines_density"
        type: "Utf8"
      - name: "coverage"
        type: "Utf8"
      - name: "ncloc"
        type: "Int64"
      - name: "security_rating"
        type: "Utf8"
      - name: "reliability_rating"
        type: "Utf8"
      - name: "sqale_rating"
        type: "Utf8"

  - name: "projects"
    description: "Search projects by organization"
    filters:
      - name: "organization"
        required: true
    request:
      path: "/projects/search"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
      query:
        - name: "organization"
          from: filter
          key: "organization"
    columns:
      - name: "organization"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "organization"
      - name: "key"
        type: "Utf8"
      - name: "name"
        type: "Utf8"
      - name: "qualifier"
        type: "Utf8"
      - name: "visibility"
        type: "Utf8"
      - name: "lastAnalysisDate"
        type: "Utf8"
      - name: "revision"
        type: "Utf8"

  - name: "issues"
    description: "Search issues for a project"
    filters:
      - name: "projects"
        required: true
    request:
      path: "/issues/search"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
      query:
        - name: "projects"
          from: filter
          key: "projects"
    columns:
      - name: "projects"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "projects"
      - name: "key"
        type: "Utf8"
      - name: "component"
        type: "Utf8"
      - name: "project"
        type: "Utf8"
      - name: "rule"
        type: "Utf8"
      - name: "status"
        type: "Utf8"
      - name: "message"
        type: "Utf8"
      - name: "severity"
        type: "Utf8"
      - name: "type"
        type: "Utf8"
      - name: "author"
        type: "Utf8"
      - name: "creationDate"
        type: "Utf8"
      - name: "effort"
        type: "Utf8"

  - name: "qualitygates_status"
    description: "Quality gate status of a project"
    filters:
      - name: "projectKey"
        required: true
    request:
      path: "/qualitygates/project_status"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
      query:
        - name: "projectKey"
          from: filter
          key: "projectKey"
    columns:
      - name: "projectKey"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "projectKey"
      - name: "status"
        type: "Utf8"

  - name: "hotspots"
    description: "Search security hotspots"
    filters:
      - name: "projectKey"
        required: true
    request:
      path: "/hotspots/search"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
      query:
        - name: "projectKey"
          from: filter
          key: "projectKey"
    columns:
      - name: "projectKey"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "projectKey"
      - name: "key"
        type: "Utf8"
      - name: "vulnerabilityProbability"
        type: "Utf8"
      - name: "status"
        type: "Utf8"
      - name: "message"
        type: "Utf8"
      - name: "author"
        type: "Utf8"
      - name: "creationDate"
        type: "Utf8"

  - name: "component_tree"
    description: "File level measures"
    filters:
      - name: "component"
        required: true
      - name: "metricKeys"
        required: true
    request:
      path: "/measures/component_tree"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
      query:
        - name: "component"
          from: filter
          key: "component"
        - name: "metricKeys"
          from: filter
          key: "metricKeys"
    columns:
      - name: "component"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "component"
      - name: "metricKeys"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "metricKeys"
      - name: "key"
        type: "Utf8"
      - name: "name"
        type: "Utf8"
      - name: "qualifier"
        type: "Utf8"
      - name: "path"
        type: "Utf8"
      - name: "language"
        type: "Utf8"

  - name: "project_branches"
    description: "List branches of a project"
    filters:
      - name: "project"
        required: true
    request:
      path: "/project_branches/list"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
      query:
        - name: "project"
          from: filter
          key: "project"
    columns:
      - name: "project"
        type: "Utf8"
        expr:
          kind: from_filter
          key: "project"
      - name: "name"
        type: "Utf8"
      - name: "isMain"
        type: "Boolean"
      - name: "type"
        type: "Utf8"
      - name: "status"
        type: "Utf8"
      - name: "analysisDate"
        type: "Utf8"

  - name: "metrics_catalog"
    description: "List of all available metrics"
    request:
      path: "/metrics/search"
      method: "GET"
      headers:
        - name: Authorization
          from: template
          template: "Bearer {{ input.SONARQUBE_API_KEY }}"
    columns:
      - name: "key"
        type: "Utf8"
      - name: "name"
        type: "Utf8"
      - name: "description"
        type: "Utf8"
      - name: "domain"
        type: "Utf8"
      - name: "type"
        type: "Utf8"